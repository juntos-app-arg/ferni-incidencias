                        return null;
                      }).filter(t => t !== null && t >= 0);
                      const tiempoPromedio = tiempos.length > 0 ? Math.round(tiempos.reduce((a, b) => a + b, 0) / tiempos.length) : null;

                      const resolvedoresCount = {};
                      resueltosR.forEach(r => {
                        const key = r.usuario_resuelve_email || r.usuario_resuelve;
                        const name = r.usuario_resuelve;
                        if (key && name) {
                          if (!resolvedoresCount[key]) resolvedoresCount[key] = { nombre: name, count: 0 };
                          resolvedoresCount[key].count++;
                        }
                      });
                      const topResolvedor = Object.values(resolvedoresCount).sort((a, b) => b.count - a.count)[0];

                      const mitad = Math.floor(reportesFiltrados.length / 2);
                      const primeraM = reportesFiltrados.slice(mitad);
                      const segundaM = reportesFiltrados.slice(0, mitad);
                      const tasaPrimera = primeraM.length > 0 ? primeraM.filter(r => r.estado === 'resuelto').length / primeraM.length : 0;
                      const tasaSegunda = segundaM.length > 0 ? segundaM.filter(r => r.estado === 'resuelto').length / segundaM.length : 0;
                      const tendencia = tasaSegunda > tasaPrimera + 0.05 ? 'mejorando' : tasaSegunda < tasaPrimera - 0.05 ? 'empeorando' : 'estable';

                      let sucCritica = null;
                      if (esAdmin && sucursalActiva === 'TODAS') {
                        const sucStats = SUCURSALES.map(suc => {
                          const rep = reportesFiltrados.filter(r => r.sucursal === suc.id);
                          const ab = rep.filter(r => r.estado === 'abierto').length;
                          return { ...suc, abiertos: ab, total: rep.length };
                        }).filter(s => s.total > 0).sort((a, b) => b.abiertos - a.abiertos);
                        sucCritica = sucStats.length > 0 && sucStats[0].abiertos > 0 ? sucStats[0] : null;
                      }

                      const recomendaciones = [];

                      if (tasaRes < 60) {
                        recomendaciones.push({ tipo: 'alerta', texto: `La tasa de resolución es del ${tasaRes}%. Objetivo recomendado: 80%+. Considerar asignar responsables fijos por categoría.` });
                      } else if (tasaRes >= 80) {
                        recomendaciones.push({ tipo: 'exito', texto: `Excelente tasa de resolución del ${tasaRes}%. El equipo está respondiendo bien a las incidencias.` });
                      } else {
                        recomendaciones.push({ tipo: 'atencion', texto: `Tasa de resolución del ${tasaRes}%. Hay margen de mejora, el objetivo ideal es superar el 80%.` });
                      }

                      if (catCritica && catCriticaId[1] >= 3) {
                        recomendaciones.push({ tipo: 'alerta', texto: `"${catCritica.icon} ${catCritica.nombre}" tiene ${catCriticaId[1]} incidencias abiertas. Recomendación: priorizar esta categoría esta semana.` });
                      }

                      if (peorCategoria && peorCategoria.tasa < 50) {
                        recomendaciones.push({ tipo: 'atencion', texto: `"${peorCategoria.icon} ${peorCategoria.nombre}" tiene la tasa más baja (${peorCategoria.tasa}%). Revisar si hay bloqueos o falta de recursos.` });
                      }

                      if (tiempoPromedio !== null) {
                        if (tiempoPromedio > 72) {
                          recomendaciones.push({ tipo: 'alerta', texto: `Tiempo promedio de resolución: ${tiempoPromedio}hs (~${Math.round(tiempoPromedio/24)} días). Es alto. Definir SLAs por categoría puede mejorar esto.` });
                        } else if (tiempoPromedio <= 24) {
                          recomendaciones.push({ tipo: 'exito', texto: `Tiempo promedio de resolución: ${tiempoPromedio}hs. Respuesta rápida del equipo.` });
                        } else {
                          recomendaciones.push({ tipo: 'atencion', texto: `Tiempo promedio de resolución: ${tiempoPromedio}hs (~${Math.round(tiempoPromedio/24)} días). Aceptable, pero se puede mejorar.` });
                        }
                      }

                      if (topResolvedor) {
                        recomendaciones.push({ tipo: 'exito', texto: `${topResolvedor.nombre} lidera las resoluciones con ${topResolvedor.count} problemas resueltos. Reconocer su compromiso.` });
                      }

                      if (tendencia === 'mejorando') {
                        recomendaciones.push({ tipo: 'exito', texto: 'Tendencia positiva: la tasa de resolución viene mejorando en el período reciente.' });
                      } else if (tendencia === 'empeorando') {
                        recomendaciones.push({ tipo: 'alerta', texto: 'Tendencia negativa: la tasa de resolución viene bajando. Revisar carga de trabajo y recursos.' });
                      }

                      if (sucCritica && sucCritica.abiertos >= 3) {
                        recomendaciones.push({ tipo: 'atencion', texto: `${sucCritica.nombre} tiene ${sucCritica.abiertos} incidencias abiertas, más que otras sucursales. Requiere atención.` });
                      }

                      if (abiertosR.length === 0 && totalR > 0) {
                        recomendaciones.push({ tipo: 'exito', texto: '¡No hay incidencias abiertas! Todas resueltas. Excelente trabajo del equipo.' });
                      }

                      return recomendaciones;
                    };

                    const [mostrarAnalisis, setMostrarAnalisis] = useState(false);
                    const analisis = mostrarAnalisis ? generarAnalisis() : null;

                    return (
                      <div className="bg-white rounded-lg p-6 shadow">
                        <button 
                          onClick={() => setMostrarAnalisis(!mostrarAnalisis)}
                          className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition flex items-center justify-center gap-3 text-lg"
                        >
                          <span className="text-2xl">🧠</span>
                          {mostrarAnalisis ? 'Ocultar Análisis' : 'Generar Análisis Inteligente'}
                        </button>
                        
                        {mostrarAnalisis && analisis && analisis.length > 0 && (
                          <div className="mt-6 space-y-3">
                            <h3 className="font-bold text-gray-800 text-lg mb-4">📋 Informe de Situación</h3>
                            {analisis.map((item, idx) => (
                              <div key={idx} className={`p-4 rounded-lg border-l-4 ${
                                item.tipo === 'alerta' ? 'bg-red-50 border-red-500' :
                                item.tipo === 'atencion' ? 'bg-yellow-50 border-yellow-500' :
                                'bg-green-50 border-green-500'
                              }`}>
                                <div className="flex items-start gap-3">
                                  <span className="text-xl mt-0.5">
                                    {item.tipo === 'alerta' ? '🔴' : item.tipo === 'atencion' ? '🟡' : '🟢'}
                                  </span>
                                  <p className={`text-sm font-medium ${
                                    item.tipo === 'alerta' ? 'text-red-800' :
                                    item.tipo === 'atencion' ? 'text-yellow-800' :
                                    'text-green-800'
                                  }`}>{item.texto}</p>
                                </div>
                              </div>
                            ))}
                            <div className="text-xs text-gray-400 mt-4 text-center">
                              Análisis generado sobre {reportesFiltrados.length} reportes • {getTextoPeriodo()}
                            </div>
                          </div>
                        )}
                        
                        {mostrarAnalisis && (!analisis || analisis.length === 0) && (
                          <div className="mt-4 text-center text-gray-500 py-4">
                            No hay suficientes datos para generar análisis en este período.
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              </div>
            );
          };

          // ========================================
          // VISTA HORARIOS — Módulo completo
          // ========================================
          const VistaHorarios = () => {
            const [vistaHor, setVistaHor] = useState('home'); // home | config | equipo | armar | tablero
            const [configHor, setConfigHor] = useState(null);
            const [colaboradores, setColaboradores] = useState([]);
            const [turnos, setTurnos] = useState({});
            const [publicadoPorArea, setPublicadoPorArea] = useState({});
            const [invitaciones, setInvitaciones] = useState([]);
            const [cargandoHor, setCargandoHor] = useState(true);
            const [errorHor, setErrorHor] = useState(null);
            const semanaActual = obtenerSemanaActual();
            const horarioId = `${sucursalActiva}_${semanaActual}_lunsab`;

            // Cargar configuración + datos en tiempo real
            useEffect(() => {
              if (!sucursalActiva) return;
              setCargandoHor(true);
              setErrorHor(null);
              console.log('[Horarios] Iniciando carga para sucursal:', sucursalActiva);

              // Timeout de seguridad: si en 8 segundos no llegó nada, mostrar fallback
              const timeoutId = setTimeout(() => {
                console.warn('[Horarios] Timeout, aplicando configuración default en memoria');
                setCargandoHor(false);
              }, 8000);

              // Configuración de la sucursal — si no existe, la creamos con AREAS_DEFAULT
              const unsubConfig = db.collection('sucursales_config').doc(sucursalActiva).onSnapshot(
                async (doc) => {
                  console.log('[Horarios] Snapshot config recibido. Existe:', doc.exists);
                  clearTimeout(timeoutId);
                  try {
                    if (doc.exists) {
                      const data = doc.data();
                      // Detectar si la config necesita migración a la nueva estructura
                      const tieneAreasViejas = data.areas && data.areas.some(a => a.id === 'salon' || a.id === 'belleza');
                      const atencionSinSubcat = data.areas && data.areas.find(a => a.id === 'atencion' && !a.subcategorias);
                      if ((tieneAreasViejas || atencionSinSubcat) && (esGerente || esAdmin)) {
                        console.log('[Horarios] Migrando estructura de áreas a nueva versión...');
                        try {
                          await db.collection('sucursales_config').doc(sucursalActiva).update({ areas: AREAS_DEFAULT });
                          console.log('[Horarios] Migración aplicada');
                          // El snapshot va a llegar solo con la nueva estructura
                        } catch (err) {
                          console.error('[Horarios] Error al migrar:', err);
                          setErrorHor('No se pudo migrar la estructura de áreas: ' + err.message);
                          setConfigHor(data); // mostrar la vieja igual
                        }
                      } else {
                        setConfigHor(data);
                      }
                    } else if (esGerente || esAdmin) {
                      console.log('[Horarios] Creando configuración inicial...');
                      const inicial = {
                        sucursal: sucursalActiva,
                        horarioApertura: '06:00',
                        horarioCierre: '24:00',
                        areas: AREAS_DEFAULT,
                        creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                      };
                      try {
                        await db.collection('sucursales_config').doc(sucursalActiva).set(inicial);
                        console.log('[Horarios] Configuración inicial creada en Firestore');
                        // No seteamos configHor acá: el snapshot va a llegar solo
                      } catch (err) {
                        console.error('[Horarios] Error al crear config:', err);
                        // Fallback: usar config en memoria aunque Firestore falle
                        setConfigHor(inicial);
                        setErrorHor(`No se pudo guardar la configuración en Firestore: ${err.message}. Trabajando en modo offline.`);
                      }
                    } else {
                      setConfigHor(null);
                    }
                  } catch (err) {
                    console.error('[Horarios] Error procesando config:', err);
                    setErrorHor('Error al cargar configuración: ' + err.message);
                  } finally {
                    setCargandoHor(false);
                  }
                },
                (err) => {
                  console.error('[Horarios] Error de snapshot config:', err);
                  clearTimeout(timeoutId);
                  setErrorHor('Error al leer configuración: ' + err.message);
                  // Fallback: si es gerente, ofrecer config en memoria
                  if (esGerente || esAdmin) {
                    setConfigHor({
                      sucursal: sucursalActiva,
                      horarioApertura: '06:00',
                      horarioCierre: '24:00',
                      areas: AREAS_DEFAULT
                    });
                  }
                  setCargandoHor(false);
                }
              );

              // Colaboradores
              const unsubColabs = db.collection('horarios_colaboradores')
                .where('sucursal', '==', sucursalActiva)
                .onSnapshot(
                  (snap) => {
                    console.log('[Horarios] Colaboradores cargados:', snap.size);
                    setColaboradores(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                  },
                  (err) => {
                    console.error('[Horarios] Error colaboradores:', err);
                  }
                );

              // Horario semanal
              const unsubHor = db.collection('horarios_semanas').doc(horarioId).onSnapshot(
                (doc) => {
                  console.log('[Horarios] Horario semanal cargado. Existe:', doc.exists);
                  if (doc.exists) {
                    const d = doc.data();
                    setTurnos(d.turnos || {});
                    setPublicadoPorArea(d.publicadoPorArea || {});
                  } else {
                    setTurnos({});
                    setPublicadoPorArea({});
                  }
                },
                (err) => {
                  console.error('[Horarios] Error horario semanal:', err);
                }
              );

              // Invitaciones (solo gerente)
              let unsubInvs = null;
              if (esGerente || esAdmin) {
                unsubInvs = db.collection('horarios_invitaciones')
                  .where('sucursal', '==', sucursalActiva)
                  .onSnapshot(
                    (snap) => {
                      console.log('[Horarios] Invitaciones cargadas:', snap.size);
                      setInvitaciones(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    },
                    (err) => {
                      console.error('[Horarios] Error invitaciones:', err);
                    }
                  );
              }

              return () => {
                clearTimeout(timeoutId);
                unsubConfig();
                unsubColabs();
                unsubHor();
                if (unsubInvs) unsubInvs();
              };
            }, [sucursalActiva, horarioId]);

            const sucursalNombre = SUCURSALES.find(s => s.id === sucursalActiva)?.nombre || sucursalActiva;
            const volverAIncidencias = () => setVista('lista');

            // Cargando
            if (cargandoHor) {
              return (
                <div className="min-h-screen bg-gray-900 text-gray-100 flex items-center justify-center p-4">
                  <div className="text-center max-w-md">
                    <div className="text-4xl mb-2">📅</div>
                    <div className="text-gray-400 mb-2">Cargando horarios...</div>
                    <div className="text-xs text-gray-600">Si tarda más de 10 segundos, abrí la consola (F12) y enviá los errores.</div>
                  </div>
                </div>
              );
            }

            // Error de carga
            if (errorHor && !configHor) {
              return (
                <div className="min-h-screen bg-gray-900 text-gray-100 p-6">
                  <div className="max-w-md mx-auto bg-gray-800 rounded-2xl p-6 mt-12">
                    <div className="text-4xl text-center mb-4">⚠️</div>
                    <h2 className="text-xl font-bold mb-2 text-center">Error al cargar horarios</h2>
                    <div className="bg-red-900/30 border border-red-700 rounded-lg p-3 mb-4 text-xs text-red-200 font-mono break-all">
                      {errorHor}
                    </div>
                    <p className="text-sm text-gray-400 mb-4">
                      Esto suele pasar cuando las reglas de Firestore bloquean acceso a las nuevas colecciones. Avisale a Lucas con captura de la consola (F12).
                    </p>
                    <div className="flex gap-2">
                      <button onClick={volverAIncidencias} className="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-sm">← Volver a Incidencias</button>
                      <button onClick={() => window.location.reload()} className="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm">Reintentar</button>
                    </div>
                  </div>
                </div>
              );
            }

            // Sin configuración (empleado entrando antes de que el gerente configure)
            if (!configHor) {
              return (
                <div className="min-h-screen bg-gray-900 text-gray-100 p-6">
                  <div className="max-w-md mx-auto bg-gray-800 rounded-2xl p-8 text-center mt-12">
                    <div className="text-5xl mb-4">📅</div>
                    <h2 className="text-xl font-bold mb-2">Módulo no configurado</h2>
                    <p className="text-gray-400 text-sm mb-6">
                      El gerente de {sucursalNombre} todavía no configuró el módulo de horarios.
                    </p>
                    {!esLider && (
                      <button onClick={volverAIncidencias} className="px-4 py-2 bg-blue-600 rounded-lg text-sm">← Volver a Incidencias</button>
                    )}
                  </div>
                </div>
              );
            }

            // Renderizar sub-vistas
            return (
              <div className="min-h-screen bg-gray-900 text-gray-100">
                {/* Header */}
                <div className="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10">
                  <div className="max-w-6xl mx-auto flex justify-between items-center">
                    <div className="flex items-center gap-3">
                      {vistaHor !== 'home' && (
                        <button onClick={() => setVistaHor('home')} className="text-gray-400 hover:text-white text-sm">← Volver</button>
                      )}
                      <div>
                        <div className="text-xs text-gray-500 uppercase tracking-wider">{sucursalActiva} · {sucursalNombre}</div>
                        <h1 className="text-xl font-bold">
                          {vistaHor === 'home' && '📅 Horarios'}
                          {vistaHor === 'config' && '⚙️ Configuración'}
                          {vistaHor === 'equipo' && '👥 Mi Equipo'}
                          {vistaHor === 'armar' && '📋 Armar Horario'}
                          {vistaHor === 'tablero' && '📊 Tablero Consolidado'}
                        </h1>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="text-right">
                        <div className="text-sm font-medium">{usuario}</div>
                        <div className="text-xs text-gray-500">
                          {esAdmin && '👔 Admin'}
                          {esGerente && '🏢 Gerente'}
                          {esLider && `🎯 Líder ${configHor.areas.find(a => a.id === areaLider)?.nombre || ''}`}
                          {!esAdmin && !esGerente && !esLider && '👤 Empleado'}
                        </div>
                      </div>
                      {!esLider && (
                        <button onClick={volverAIncidencias} className="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-xs">← Incidencias</button>
                      )}
                      {esLider && (
                        <button onClick={() => { borrarSesion(); setUsuario(null); setUsuarioEmail(null); setSucursalUsuario(null); setSucursalActiva(null); setEsAdmin(false); setEsGerente(false); setEsLider(false); setAreaLider(null); setReportes([]); setVista('login'); }} className="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-xs">Salir</button>
                      )}
                    </div>
                  </div>
                </div>

                {/* Banner de error si hay problemas con Firestore */}
                {errorHor && (
                  <div className="max-w-6xl mx-auto px-4 pt-3">
                    <div className="bg-yellow-900/30 border border-yellow-700 rounded-lg p-3 text-xs text-yellow-200">
                      ⚠️ <strong>Modo offline:</strong> {errorHor}
                    </div>
                  </div>
                )}

                {/* Contenido */}
                <div className="max-w-6xl mx-auto p-4">
                  {vistaHor === 'home' && (
                    <HorariosHome
                      configHor={configHor}
                      publicadoPorArea={publicadoPorArea}
                      colaboradores={colaboradores}
                      semanaActual={semanaActual}
                      esGerente={esGerente}
                      esAdmin={esAdmin}
                      esLider={esLider}
                      areaLider={areaLider}
                      setVistaHor={setVistaHor}
                    />
                  )}
                  {vistaHor === 'config' && (
                    <HorariosConfig
                      configHor={configHor}
                      invitaciones={invitaciones}
                      sucursalActiva={sucursalActiva}
                      usuario={usuario}
                    />
                  )}
                  {vistaHor === 'equipo' && (
                    <HorariosMiEquipo
                      configHor={configHor}
                      colaboradores={colaboradores}
                      sucursalActiva={sucursalActiva}
                      esLider={esLider}
                      areaLider={areaLider}
                    />
                  )}
                  {vistaHor === 'armar' && (
                    <HorariosArmar
                      configHor={configHor}
                      colaboradores={colaboradores}
                      turnos={turnos}
                      publicadoPorArea={publicadoPorArea}
                      horarioId={horarioId}
                      sucursalActiva={sucursalActiva}
                      semanaActual={semanaActual}
                      areaLider={areaLider}
                      esLider={esLider}
                      esGerente={esGerente}
                    />
                  )}
                  {vistaHor === 'tablero' && (
                    <HorariosTablero
                      configHor={configHor}
                      colaboradores={colaboradores}
                      turnos={turnos}
                      publicadoPorArea={publicadoPorArea}
                    />
                  )}
                </div>
              </div>
            );
          };

          // ====== HOME del módulo ======
          const HorariosHome = ({ configHor, publicadoPorArea, colaboradores, semanaActual, esGerente, esAdmin, esLider, areaLider, setVistaHor }) => {
            const totalAreas = configHor.areas.length;
            const publicadas = configHor.areas.filter(a => publicadoPorArea[a.id]).length;
            return (
              <div>
                {/* Estado semana */}
                <div className="bg-gray-800 rounded-xl p-5 mb-4 border border-gray-700">
                  <div className="flex justify-between items-center mb-3">
                    <div>
                      <div className="text-xs text-gray-500">Estado de la semana</div>
                      <div className="text-lg font-bold">{semanaActual} · Lun a Sáb</div>
                    </div>
                    <div className={`px-3 py-1.5 rounded-md text-sm font-medium ${publicadas === totalAreas ? 'bg-green-900/50 text-green-400' : 'bg-yellow-900/50 text-yellow-400'}`}>
                      {publicadas}/{totalAreas} áreas publicadas
                    </div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                    {configHor.areas.map(a => (
                      <div key={a.id} className="bg-gray-900 p-2 rounded-lg" style={{ borderLeft: `3px solid ${a.color}` }}>
                        <div className="text-xs text-gray-500 uppercase">{a.nombre}</div>
                        <div className={`text-xs font-medium ${publicadoPorArea[a.id] ? 'text-green-400' : 'text-yellow-400'}`}>
                          {publicadoPorArea[a.id] ? '✓ Publicado' : '◷ En borrador'}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Acciones */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {(esGerente || esAdmin) && (
                    <CardAccionHor icono="⚙️" titulo="Configuración" desc="Áreas, líderes e invitaciones" onClick={() => setVistaHor('config')} />
                  )}
                  {(esGerente || esAdmin || esLider) && (
                    <CardAccionHor icono="👥" titulo="Mi Equipo" desc={esLider ? 'Gestionar mi área' : 'Ver todos los colaboradores'} onClick={() => setVistaHor('equipo')} />
                  )}
                  {esLider && (
                    <CardAccionHor icono="📋" titulo="Armar Horario" desc="Asignar turnos a mi equipo" onClick={() => setVistaHor('armar')} destacado />
                  )}
                  <CardAccionHor icono="📊" titulo="Tablero Consolidado" desc="Ver toda la sucursal" onClick={() => setVistaHor('tablero')} destacado={!esLider} />
                </div>

                {colaboradores.length === 0 && (esGerente || esAdmin) && (
                  <div className="mt-4 p-4 bg-blue-900/30 border border-blue-700 rounded-lg text-sm text-blue-200">
                    💡 Todavía no hay colaboradores cargados. Andá a <strong>Mi Equipo</strong> para empezar a sumarlos, o invitá líderes desde <strong>Configuración</strong> para que carguen los suyos.
                  </div>
                )}
              </div>
            );
          };

          const CardAccionHor = ({ icono, titulo, desc, onClick, destacado }) => (
            <button onClick={onClick} className={`text-left p-5 rounded-xl border transition ${destacado ? 'bg-gray-800 border-blue-500/50 hover:border-blue-500' : 'bg-gray-800 border-gray-700 hover:border-gray-500'}`}>
              <div className="text-2xl mb-2">{icono}</div>
              <div className="font-semibold">{titulo}</div>
              <div className="text-sm text-gray-400 mt-1">{desc}</div>
            </button>
          );

          // ====== CONFIGURACIÓN ======
          const HorariosConfig = ({ configHor, invitaciones, sucursalActiva, usuario }) => {
            const [codigoGenerado, setCodigoGenerado] = useState(null);
            const [horaApertura, setHoraApertura] = useState(configHor.horarioApertura);
            const [horaCierre, setHoraCierre] = useState(configHor.horarioCierre);

            const guardarHorarios = async () => {
              try {
                await db.collection('sucursales_config').doc(sucursalActiva).update({
                  horarioApertura: horaApertura,
                  horarioCierre: horaCierre
                });
                alert('✓ Horarios actualizados');
              } catch (err) { alert('Error: ' + err.message); }
            };

            const generarInvitacion = async (areaId) => {
              const codigo = generarCodigoInvitacion(sucursalActiva, areaId);
              const nueva = {
                codigo,
                sucursal: sucursalActiva,
                area: areaId,
                creadaPor: usuario,
                creadaEn: firebase.firestore.FieldValue.serverTimestamp(),
                expiraEn: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000),
                usada: false,
                usadaPor: null
              };
              try {
                await db.collection('horarios_invitaciones').doc(codigo).set(nueva);
                setCodigoGenerado(nueva);
              } catch (err) { alert('Error: ' + err.message); }
            };

            const revocarInvitacion = async (codigo) => {
              if (!confirm('¿Revocar este código? Si el líder ya lo usó, perderá el acceso.')) return;
              try {
                await db.collection('horarios_invitaciones').doc(codigo).delete();
              } catch (err) { alert('Error: ' + err.message); }
            };

            const compartirWhatsApp = (inv) => {
              const area = configHor.areas.find(a => a.id === inv.area);
              const mensaje = encodeURIComponent(
                `Hola! Te invito a sumarte a FERNI Horarios como Líder de ${area.nombre} en ${inv.sucursal}.\n\n` +
                `Tu código de invitación es: ${inv.codigo}\n\n` +
                `Entrá a la app, elegí "🎟️ Código" y pegá ese código. Vence en 7 días.`
              );
              window.open(`https://wa.me/?text=${mensaje}`, '_blank');
            };

            return (
              <div>
                {/* Horario tienda */}
                <div className="bg-gray-800 rounded-xl p-5 mb-4 border border-gray-700">
                  <h3 className="font-semibold mb-3">Horario de la tienda</h3>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Apertura</label>
                      <input type="time" value={horaApertura} onChange={e => setHoraApertura(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Cierre</label>
                      <input type="text" value={horaCierre} onChange={e => setHoraCierre(e.target.value)} placeholder="24:00" className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white" />
                    </div>
                  </div>
                  <div className="text-xs text-gray-500 mb-3">💡 Para cierre a medianoche, escribí 24:00</div>
                  <button onClick={guardarHorarios} className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium">Guardar</button>
                </div>

                {/* Áreas y líderes */}
                <div className="bg-gray-800 rounded-xl p-5 mb-4 border border-gray-700">
                  <h3 className="font-semibold mb-3">Áreas y líderes</h3>
                  {configHor.areas.map(area => {
                    const invitsArea = invitaciones.filter(i => i.area === area.id);
                    const lideresActivos = invitsArea.filter(i => i.usada);
                    return (
                      <div key={area.id} className="bg-gray-900 rounded-lg p-3 mb-2 flex justify-between items-start gap-2" style={{ borderLeft: `4px solid ${area.color}` }}>
                        <div className="flex-1 min-w-0">
                          <div className="font-medium">{area.nombre}</div>
                          <div className="text-xs text-gray-500 mt-1">{area.roles.join(' · ')}</div>
                          {area.subcategorias && area.subcategorias.length > 0 && (
                            <div className="text-xs text-gray-500 mt-1">
                              <span className="text-gray-400">Sub-categorías:</span> {area.subcategorias.join(' · ')}
                            </div>
                          )}
                          <div className="text-xs mt-1">
                            {lideresActivos.length > 0 ? (
                              <span className="text-green-400">
                                {lideresActivos.length === 1 ? 'Líder' : `Líderes (${lideresActivos.length})`}:{' '}
                                {lideresActivos.map(l => `✓ ${l.usadaPor}`).join(' · ')}
                              </span>
                            ) : (
                              <span className="text-yellow-400">Sin líder asignado</span>
                            )}
                          </div>
                        </div>
                        <button onClick={() => generarInvitacion(area.id)} className="bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/50 text-blue-300 px-3 py-1.5 rounded text-xs whitespace-nowrap">
                          {lideresActivos.length > 0 ? '+ Invitar otro' : '+ Invitar'}
                        </button>
                      </div>
                    );
                  })}
                </div>

                {/* Invitaciones */}
                {invitaciones.length > 0 && (
                  <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
                    <h3 className="font-semibold mb-3">Códigos ({invitaciones.length})</h3>
                    {invitaciones.map(inv => {
                      const area = configHor.areas.find(a => a.id === inv.area);
                      const expiraEn = getFecha(inv.expiraEn);
                      const expirado = expiraEn && Date.now() > expiraEn.getTime();
                      const dias = expiraEn ? Math.max(0, Math.ceil((expiraEn.getTime() - Date.now()) / (24 * 60 * 60 * 1000))) : 0;
                      return (
                        <div key={inv.codigo} className="bg-gray-900 rounded-lg p-3 mb-2 flex flex-wrap items-center gap-2">
                          <div className="flex-1 min-w-[200px]">
                            <div className={`font-mono font-bold tracking-wider ${inv.usada ? 'text-green-400' : expirado ? 'text-gray-600' : 'text-white'}`}>{inv.codigo}</div>
                            <div className="text-xs text-gray-500">
                              {area?.nombre}
                              {inv.usada && <span className="text-green-400"> · ✓ usado por {inv.usadaPor}</span>}
                              {!inv.usada && expirado && <span className="text-red-400"> · expirado</span>}
                              {!inv.usada && !expirado && <span className="text-yellow-400"> · pendiente · {dias}d</span>}
                            </div>
                          </div>
                          {!inv.usada && !expirado && (
                            <>
                              <button onClick={() => navigator.clipboard.writeText(inv.codigo)} className="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-xs">📋 Copiar</button>
                              <button onClick={() => compartirWhatsApp(inv)} className="bg-green-600 hover:bg-green-700 px-2 py-1 rounded text-xs">WhatsApp</button>
                            </>
                          )}
                          <button onClick={() => revocarInvitacion(inv.codigo)} className="border border-red-500/50 text-red-400 hover:bg-red-500/10 px-2 py-1 rounded text-xs">Revocar</button>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Modal código generado */}
                {codigoGenerado && (
                  <div className="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 max-w-md w-full text-center">
                      <div className="text-4xl mb-2">🎟️</div>
                      <h3 className="text-lg font-bold mb-2">Código generado</h3>
                      <p className="text-sm text-gray-400 mb-4">
                        Compartilo con el líder de <strong style={{ color: configHor.areas.find(a => a.id === codigoGenerado.area)?.color }}>{configHor.areas.find(a => a.id === codigoGenerado.area)?.nombre}</strong> por WhatsApp. Vence en 7 días.
                      </p>
                      <div className="bg-gray-900 border-2 border-dashed border-blue-500 rounded-lg py-4 px-3 mb-4 font-mono text-2xl font-bold tracking-widest text-blue-400">{codigoGenerado.codigo}</div>
                      <div className="grid grid-cols-2 gap-2 mb-2">
                        <button onClick={() => navigator.clipboard.writeText(codigoGenerado.codigo)} className="bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm">📋 Copiar</button>
                        <button onClick={() => compartirWhatsApp(codigoGenerado)} className="bg-green-600 hover:bg-green-700 py-2 rounded-lg text-sm font-medium">📱 WhatsApp</button>
                      </div>
                      <button onClick={() => setCodigoGenerado(null)} className="w-full bg-gray-900 border border-gray-700 py-2 rounded-lg text-sm text-gray-400">Cerrar</button>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          // ====== MI EQUIPO ======
          const HorariosMiEquipo = ({ configHor, colaboradores, sucursalActiva, esLider, areaLider }) => {
            const [filtroArea, setFiltroArea] = useState('todos');
            const [filtroSubcat, setFiltroSubcat] = useState('todas');
            // editandoColab: null = nada, {} = agregar, {id, ...} = editar
            const [editandoColab, setEditandoColab] = useState(null);

            const colabsVisibles = (() => {
              let lista = esLider ? colaboradores.filter(c => c.area === areaLider) : colaboradores;
              if (!esLider && filtroArea !== 'todos') lista = lista.filter(c => c.area === filtroArea);
              return lista;
            })();

            const porArea = {};
            colabsVisibles.forEach(c => {
              if (!porArea[c.area]) porArea[c.area] = [];
              porArea[c.area].push(c);
            });

            const cambiarEstado = async (colab, nuevoEstado) => {
              try {
                await db.collection('horarios_colaboradores').doc(colab.id).update({ estado: nuevoEstado });
              } catch (err) { alert('Error: ' + err.message); }
            };

            const eliminar = async (colab) => {
              if (!confirm(`¿Eliminar a ${colab.nombre} del equipo?`)) return;
              try {
                await db.collection('horarios_colaboradores').doc(colab.id).delete();
              } catch (err) { alert('Error: ' + err.message); }
            };

            // Detectar colaboradores huérfanos (área inexistente)
            const idsAreasValidas = configHor.areas.map(a => a.id);
            const huerfanos = colaboradores.filter(c => !idsAreasValidas.includes(c.area));

            const limpiarHuerfanos = async () => {
              if (!confirm(`¿Eliminar ${huerfanos.length} colaborador(es) con área inválida?\n\n${huerfanos.map(c => `· ${c.nombre} (área: ${c.area})`).join('\n')}\n\nEsta acción no se puede deshacer.`)) return;
              try {
                const batch = db.batch();
                huerfanos.forEach(c => batch.delete(db.collection('horarios_colaboradores').doc(c.id)));
                await batch.commit();
                alert(`✓ ${huerfanos.length} colaborador(es) eliminado(s)`);
              } catch (err) { alert('Error: ' + err.message); }
            };

            return (
              <div>
                {/* Banner de huérfanos (solo gerente/admin) */}
                {!esLider && huerfanos.length > 0 && (
                  <div className="bg-yellow-900/30 border border-yellow-700 rounded-xl p-3 mb-3">
                    <div className="flex justify-between items-start gap-2">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-yellow-300 mb-1">⚠️ Colaboradores con área inválida</div>
                        <div className="text-xs text-yellow-200/80">
                          {huerfanos.length} colaborador{huerfanos.length === 1 ? '' : 'es'} con área que ya no existe (probablemente de Salón o Belleza). No aparecen en el tablero ni en los filtros.
                        </div>
                        <div className="text-xs text-yellow-200/60 mt-1 font-mono break-words">
                          {huerfanos.map(c => `${c.nombre} (${c.area})`).join(' · ')}
                        </div>
                      </div>
                      <button onClick={limpiarHuerfanos} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-xs whitespace-nowrap font-medium">🗑 Eliminar {huerfanos.length}</button>
                    </div>
                  </div>
                )}

                {!esLider && (
                  <div className="flex gap-2 mb-3 flex-wrap">
                    <button onClick={() => { setFiltroArea('todos'); setFiltroSubcat('todas'); }} className={`px-3 py-1 rounded-full text-xs ${filtroArea === 'todos' ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-300'}`}>Todas</button>
                    {configHor.areas.map(a => (
                      <button key={a.id} onClick={() => { setFiltroArea(a.id); setFiltroSubcat('todas'); }} className={`px-3 py-1 rounded-full text-xs border ${filtroArea === a.id ? 'text-white' : 'bg-gray-800 text-gray-300 border-gray-700'}`} style={filtroArea === a.id ? { background: a.color + '33', borderColor: a.color } : {}}>{a.nombre}</button>
                    ))}
                  </div>
                )}

                <div className="bg-gray-800 rounded-xl p-4 mb-3 border border-gray-700 flex justify-between items-center">
                  <div>
                    <div className="text-xs text-gray-500">Total visible</div>
                    <div className="text-xl font-bold">{colabsVisibles.length} <span className="text-xs text-gray-400 font-normal">colaboradores</span></div>
                  </div>
                  <button onClick={() => setEditandoColab({})} className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium">+ Agregar</button>
                </div>

                {/* Modal agregar/editar */}
                {editandoColab && (
                  <ModalEditarColaborador
                    colab={editandoColab}
                    configHor={configHor}
                    sucursalActiva={sucursalActiva}
                    esLider={esLider}
                    areaLider={areaLider}
                    onClose={() => setEditandoColab(null)}
                  />
                )}

                {Object.entries(porArea).map(([areaId, colabs]) => {
                  const area = configHor.areas.find(a => a.id === areaId);
                  if (!area) return null;
                  const tieneSubcats = area.subcategorias && area.subcategorias.length > 0;

                  // Si el área tiene subcategorías, agrupar internamente
                  let colabsFiltrados = colabs;
                  if (tieneSubcats && !esLider && filtroArea === areaId && filtroSubcat !== 'todas') {
                    colabsFiltrados = colabs.filter(c => c.subcategoria === filtroSubcat);
                  }

                  // Agrupar por subcategoría si aplica
                  const porSubcat = {};
                  if (tieneSubcats) {
                    colabsFiltrados.forEach(c => {
                      const k = c.subcategoria || '_sin_subcat';
                      if (!porSubcat[k]) porSubcat[k] = [];
                      porSubcat[k].push(c);
                    });
                  }

                  return (
                    <div key={areaId} className="mb-4">
                      <div className="flex items-center gap-2 mb-2 px-1">
                        <div className="w-2 h-2 rounded-sm" style={{ background: area.color }}></div>
                        <div className="text-xs text-gray-400 uppercase tracking-wider font-medium">{area.nombre} · {colabsFiltrados.length}</div>
                      </div>

                      {/* Filtros de subcategoría visibles si el área activa los tiene */}
                      {tieneSubcats && (filtroArea === areaId || esLider && areaLider === areaId) && (
                        <div className="flex gap-1 mb-2 flex-wrap">
                          <button onClick={() => setFiltroSubcat('todas')} className={`px-2 py-0.5 rounded-full text-[10px] ${filtroSubcat === 'todas' ? 'text-white' : 'bg-gray-800 text-gray-400 border border-gray-700'}`} style={filtroSubcat === 'todas' ? { background: area.color + '44', border: `1px solid ${area.color}` } : {}}>Todas</button>
                          {area.subcategorias.map(s => (
                            <button key={s} onClick={() => setFiltroSubcat(s)} className={`px-2 py-0.5 rounded-full text-[10px] ${filtroSubcat === s ? 'text-white' : 'bg-gray-800 text-gray-400 border border-gray-700'}`} style={filtroSubcat === s ? { background: area.color + '44', border: `1px solid ${area.color}` } : {}}>{s}</button>
                          ))}
                        </div>
                      )}

                      {tieneSubcats ? (
                        // Render agrupado por subcategoría
                        Object.entries(porSubcat).map(([subcat, lista]) => (
                          <div key={subcat} className="mb-3">
                            <div className="text-[10px] text-gray-500 uppercase tracking-wider px-1 mb-1">
                              ↳ {subcat === '_sin_subcat' ? '⚠️ Sin subcategoría asignada' : subcat} · {lista.length}
                            </div>
                            <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                              {lista.map((c, idx) => (
                                <FilaColaborador key={c.id} c={c} idx={idx} total={lista.length} area={area}
                                  onEditar={() => setEditandoColab(c)} onCambiarEstado={cambiarEstado} onEliminar={eliminar} />
                              ))}
                            </div>
                          </div>
                        ))
                      ) : (
                        <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                          {colabsFiltrados.map((c, idx) => (
                            <FilaColaborador key={c.id} c={c} idx={idx} total={colabsFiltrados.length} area={area}
                              onEditar={() => setEditandoColab(c)} onCambiarEstado={cambiarEstado} onEliminar={eliminar} />
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}

                {colabsVisibles.length === 0 && (
                  <div className="text-center py-8 text-gray-500">
                    <div className="text-3xl mb-2">👥</div>
                    <div>Aún no hay colaboradores. Apretá "+ Agregar" para empezar.</div>
                  </div>
                )}
              </div>
            );
          };

          // Fila de colaborador (extraída para reutilizar entre vista plana y agrupada por subcat)
          const FilaColaborador = ({ c, idx, total, area, onEditar, onCambiarEstado, onEliminar }) => (
            <div className={`flex items-center p-3 ${idx < total - 1 ? 'border-b border-gray-700' : ''}`}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mr-3" style={{ background: area.color + '33', color: area.color }}>{obtenerIniciales(c.nombre)}</div>
              <div className="flex-1 min-w-0">
                <div className="font-medium truncate flex items-center gap-2">
                  {c.nombre}
                  {c.esLider && <span className="text-[10px] text-red-400 border border-red-500/50 px-1.5 py-0.5 rounded">LÍDER</span>}
                </div>
                <div className="text-xs text-gray-500">
                  {c.rol}
                  {c.subcategoria && <span className="text-gray-400"> · {c.subcategoria}</span>}
                  {c.estado === 'vacaciones' && <span className="text-green-400 ml-2">· 🌴 Vacaciones</span>}
                  {c.estado === 'licencia' && <span className="text-yellow-400 ml-2">· 📋 Licencia</span>}
                </div>
              </div>
              <div className="flex gap-1">
                <select value={c.estado} onChange={e => onCambiarEstado(c, e.target.value)} className="bg-gray-900 border border-gray-700 rounded text-xs px-2 py-1">
                  <option value="activo">Activo</option>
                  <option value="vacaciones">Vacaciones</option>
                  <option value="licencia">Licencia</option>
                </select>
                <button onClick={onEditar} title="Editar" className="text-blue-400 hover:bg-blue-500/10 px-2 py-1 rounded text-xs border border-blue-500/30">✏️</button>
                <button onClick={() => onEliminar(c)} title="Eliminar" className="text-red-400 hover:bg-red-500/10 px-2 py-1 rounded text-xs border border-red-500/30">×</button>
              </div>
            </div>
          );

          // Modal unificado de agregar/editar colaborador
          const ModalEditarColaborador = ({ colab, configHor, sucursalActiva, esLider, areaLider, onClose }) => {
            const esEdicion = !!colab.id;
            const [nombre, setNombre] = useState(colab.nombre || '');
            const [area, setArea] = useState(colab.area || (esLider ? areaLider : ''));
            const [rol, setRol] = useState(colab.rol || '');
            const [subcategoria, setSubcategoria] = useState(colab.subcategoria || '');
            const [guardando, setGuardando] = useState(false);

            const areasDisponibles = esLider
              ? configHor.areas.filter(a => a.id === areaLider)
              : configHor.areas;
            const areaObj = configHor.areas.find(a => a.id === area);
            const tieneSubcats = areaObj && areaObj.subcategorias && areaObj.subcategorias.length > 0;

            const guardar = async () => {
              if (!nombre.trim() || !area || !rol) { alert('Completá nombre, área y rol'); return; }
              if (tieneSubcats && !subcategoria) { alert(`Tenés que elegir una sub-categoría para ${areaObj.nombre}`); return; }
              const rolLower = rol.toLowerCase();
              const esLiderRol = rolLower.includes('líder') || rolLower.includes('lider') || rolLower.includes('colíder') || rolLower.includes('colider');
              const datos = {
                nombre: nombre.trim(),
                sucursal: sucursalActiva,
                area,
                rol,
                esLider: !!esLiderRol,
                subcategoria: tieneSubcats ? subcategoria : null
              };
              setGuardando(true);
              try {
                if (esEdicion) {
                  await db.collection('horarios_colaboradores').doc(colab.id).update(datos);
                } else {
                  await db.collection('horarios_colaboradores').add({
                    ...datos,
                    estado: 'activo',
                    creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                  });
                }
                onClose();
              } catch (err) {
                alert('Error: ' + err.message);
                setGuardando(false);
              }
            };

            return (
              <div className="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
                <div className="bg-gray-800 border border-gray-700 rounded-xl p-5 max-w-md w-full">
                  <h3 className="font-bold mb-3">{esEdicion ? 'Editar colaborador' : 'Agregar colaborador'}</h3>
                  <div className="space-y-3 mb-4">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Nombre completo</label>
                      <input type="text" placeholder="Nombre y apellido" value={nombre} onChange={e => setNombre(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Área</label>
                      <select value={area} onChange={e => { setArea(e.target.value); setRol(''); setSubcategoria(''); }} disabled={esLider} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white disabled:opacity-60">
                        <option value="">Elegir área...</option>
                        {areasDisponibles.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
                      </select>
                    </div>
                    {tieneSubcats && (
                      <div>
                        <label className="text-xs text-gray-400 block mb-1">Sub-categoría</label>
                        <select value={subcategoria} onChange={e => setSubcategoria(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white">
                          <option value="">Elegir sub-categoría...</option>
                          {areaObj.subcategorias.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    )}
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Rol</label>
                      <select value={rol} onChange={e => setRol(e.target.value)} disabled={!area} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white disabled:opacity-60">
                        <option value="">Elegir rol...</option>
                        {areaObj && areaObj.roles.map(r => <option key={r} value={r}>{r}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={onClose} disabled={guardando} className="flex-1 bg-gray-900 border border-gray-700 py-2 rounded-lg text-sm">Cancelar</button>
                    <button onClick={guardar} disabled={guardando} className="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-sm font-medium disabled:opacity-60">
                      {guardando ? 'Guardando...' : (esEdicion ? 'Guardar cambios' : 'Agregar')}
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          // ====== ARMAR HORARIO ======
          const HorariosArmar = ({ configHor, colaboradores, turnos, publicadoPorArea, horarioId, sucursalActiva, semanaActual, areaLider, esLider, esGerente }) => {
            const areaIdActiva = esLider ? areaLider : (configHor.areas[0]?.id);
            const area = configHor.areas.find(a => a.id === areaIdActiva);
            const miEquipo = colaboradores.filter(c => c.area === areaIdActiva);
            const [colabModal, setColabModal] = useState(null);

            if (!area) {
              return <div className="text-center py-8 text-gray-500">Área no encontrada</div>;
            }

            const actualizarTurno = async (colabId, nuevoTurno) => {
              const nuevosTurnos = { ...turnos, [colabId]: nuevoTurno };
              try {
                await db.collection('horarios_semanas').doc(horarioId).set({
                  sucursal: sucursalActiva,
                  semana: semanaActual,
                  tipo: 'lun_sab',
                  turnos: nuevosTurnos,
                  publicadoPorArea,
                  ultimaModificacion: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                setColabModal(null);
              } catch (err) { alert('Error: ' + err.message); }
            };

            const publicarMiArea = async () => {
              const nuevo = { ...publicadoPorArea, [areaIdActiva]: true };
              try {
                await db.collection('horarios_semanas').doc(horarioId).set({
                  sucursal: sucursalActiva,
                  semana: semanaActual,
                  tipo: 'lun_sab',
                  turnos,
                  publicadoPorArea: nuevo,
                  ultimaModificacion: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                alert(`✓ Horario de "${area.nombre}" publicado al equipo`);
              } catch (err) { alert('Error: ' + err.message); }
            };

            const asignados = miEquipo.filter(c => {
              const t = turnos[c.id];
              return t && !t.franco && !t.vacaciones && t.entrada;
            }).length;

            const enFranja = (desde, hasta) => miEquipo.filter(c => {
              const t = turnos[c.id];
              if (!t || t.franco || t.vacaciones || !t.entrada) return false;
              return t.entrada < hasta && t.salida > desde;
            }).length;

            return (
              <div>
                <div className="bg-gray-800 rounded-xl p-4 mb-3 border border-gray-700" style={{ borderLeft: `4px solid ${area.color}` }}>
                  <div className="flex justify-between items-center mb-3">
                    <div>
                      <div className="text-xs text-gray-500 uppercase">Armando como</div>
                      <div className="text-lg font-bold" style={{ color: area.color }}>{area.nombre}</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    <div className="bg-gray-900 p-2 rounded">
                      <div className="text-[10px] text-gray-500 uppercase">Asignados</div>
                      <div className="font-bold">{asignados}/{miEquipo.length}</div>
                    </div>
                    <div className="bg-gray-900 p-2 rounded">
                      <div className="text-[10px] text-gray-500 uppercase">Mediodía</div>
                      <div className={`font-bold ${enFranja('12:00', '15:00') < 3 ? 'text-yellow-400' : 'text-white'}`}>{enFranja('12:00', '15:00')} pers.</div>
                    </div>
                    <div className="bg-gray-900 p-2 rounded">
                      <div className="text-[10px] text-gray-500 uppercase">Estado</div>
                      <div className={`font-bold text-xs ${publicadoPorArea[areaIdActiva] ? 'text-green-400' : 'text-yellow-400'}`}>{publicadoPorArea[areaIdActiva] ? '✓ Publicado' : '◷ Borrador'}</div>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden mb-3">
                  {(() => {
                    const tieneSubcats = area.subcategorias && area.subcategorias.length > 0;

                    const renderFila = (c, idx, total) => {
                      const t = turnos[c.id] || {};
                      const asignado = t.entrada && !t.franco && !t.vacaciones;
                      const franco = t.franco;
                      const vac = t.vacaciones || c.estado === 'vacaciones';
                      return (
                        <div key={c.id} className={`flex items-center p-3 ${idx < total - 1 ? 'border-b border-gray-700' : ''}`}>
                          <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mr-3" style={{ background: area.color + '33', color: area.color }}>{obtenerIniciales(c.nombre)}</div>
                          <div className="flex-1 min-w-0">
                            <div className="font-medium truncate">{c.nombre}{c.esLider && <span className="text-red-400 ml-1">★</span>}</div>
                            <div className="text-xs text-gray-500">{c.rol}</div>
                          </div>
                          <button onClick={() => setColabModal(c)} className="px-3 py-1.5 rounded-md text-xs font-medium border whitespace-nowrap"
                            style={asignado ? { background: area.color + '22', color: area.color, borderColor: area.color + '55' }
                              : franco ? { background: '#33333355', color: '#888', borderColor: '#3A3A3A' }
                              : vac ? { background: '#1D9E7522', color: '#5DCAA5', borderColor: '#5DCAA555' }
                              : { background: 'transparent', color: '#F1C40F', borderColor: '#F1C40F55' }}
                          >
                            {asignado ? `${t.entrada} - ${t.salida}` : franco ? 'Franco' : vac ? '🌴 Vacaciones' : '+ Asignar'}
                          </button>
                        </div>
                      );
                    };

                    if (miEquipo.length === 0) {
                      return <div className="text-center py-8 text-gray-500 text-sm">No hay colaboradores en {area.nombre} todavía</div>;
                    }

                    if (tieneSubcats) {
                      const porSubcat = {};
                      area.subcategorias.forEach(s => { porSubcat[s] = []; });
                      const sinSubcat = [];
                      miEquipo.forEach(c => {
                        if (c.subcategoria && porSubcat[c.subcategoria]) porSubcat[c.subcategoria].push(c);
                        else sinSubcat.push(c);
                      });
                      return (
                        <div>
                          {area.subcategorias.map(s => {
                            const lista = porSubcat[s];
                            if (lista.length === 0) return null;
                            return (
                              <div key={s}>
                                <div className="px-3 py-1.5 text-[10px] uppercase tracking-wider bg-gray-900/60 border-b border-gray-700" style={{ color: area.color }}>↳ {s} · {lista.length}</div>
                                {lista.map((c, idx) => renderFila(c, idx, lista.length))}
                              </div>
                            );
                          })}
                          {sinSubcat.length > 0 && (
                            <div>
                              <div className="px-3 py-1.5 text-[10px] uppercase tracking-wider bg-yellow-900/30 border-b border-gray-700 text-yellow-400">⚠️ Sin sub-categoría · {sinSubcat.length}</div>
                              {sinSubcat.map((c, idx) => renderFila(c, idx, sinSubcat.length))}
                            </div>
                          )}
                        </div>
                      );
                    }

                    return miEquipo.map((c, idx) => renderFila(c, idx, miEquipo.length));
                  })()}
                </div>

                <div className="flex gap-2">
                  <button className="flex-1 py-3 bg-gray-800 border border-gray-700 rounded-lg text-sm">Guardar borrador</button>
                  <button onClick={publicarMiArea} className="flex-1 py-3 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-bold">Publicar mi área</button>
                </div>

                {colabModal && (
                  <ModalAsignarTurno
                    colab={colabModal}
                    turno={turnos[colabModal.id]}
                    areaColor={area.color}
                    onClose={() => setColabModal(null)}
                    onSave={t => actualizarTurno(colabModal.id, t)}
                  />
                )}
              </div>
            );
          };

          const ModalAsignarTurno = ({ colab, turno, areaColor, onClose, onSave }) => {
            const [entrada, setEntrada] = useState((turno && turno.entrada) || '09:00');
            const [salida, setSalida] = useState((turno && turno.salida) || '17:00');

            return (
              <div className="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4">
                <div className="bg-gray-800 border border-gray-700 rounded-xl p-5 max-w-md w-full">
                  <div className="mb-4">
                    <div className="text-xs text-gray-500 uppercase">Asignar turno</div>
                    <div className="font-bold text-lg">{colab.nombre}</div>
                    <div className="text-sm text-gray-500">{colab.rol}</div>
                  </div>

                  <div className="mb-4">
                    <div className="text-xs text-gray-400 uppercase mb-2">Turnos típicos</div>
                    <div className="grid grid-cols-2 gap-2">
                      {TURNOS_TIPICOS.map((t, i) => (
                        <button key={i} onClick={() => { setEntrada(t.entrada); setSalida(t.salida); }} className="text-left bg-gray-900 hover:bg-gray-700 border border-gray-700 rounded-lg p-2 text-xs">
                          <div className="font-medium">{t.label}</div>
                          <div className="text-gray-500">{t.entrada} - {t.salida}</div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="mb-4">
                    <div className="text-xs text-gray-400 uppercase mb-2">Personalizado</div>
                    <div className="grid grid-cols-2 gap-2">
                      <input type="time" value={entrada} onChange={e => setEntrada(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm" />
                      <input type="time" value={salida} onChange={e => setSalida(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2 mb-3">
                    <button onClick={() => onSave({ franco: true })} className="bg-gray-900 border border-gray-700 text-gray-400 py-2 rounded-lg text-sm">Marcar Franco</button>
                    <button onClick={() => onSave({ vacaciones: true })} className="bg-green-900/30 border border-green-700 text-green-400 py-2 rounded-lg text-sm">🌴 Vacaciones</button>
                  </div>

                  <div className="flex gap-2">
                    <button onClick={onClose} className="flex-1 bg-gray-900 border border-gray-700 py-2 rounded-lg text-sm">Cancelar</button>
                    <button onClick={() => onSave({ entrada, salida })} className="flex-1 py-2 rounded-lg text-sm font-bold text-white" style={{ background: areaColor }}>Asignar turno</button>
                  </div>
                </div>
              </div>
            );
          };

          // ====== TABLERO CONSOLIDADO ======
          const HorariosTablero = ({ configHor, colaboradores, turnos, publicadoPorArea }) => {
            const franjas = generarFranjasHorarias(configHor.horarioApertura, configHor.horarioCierre);

            const porArea = {};
            configHor.areas.forEach(a => { porArea[a.id] = colaboradores.filter(c => c.area === a.id); });

            const totales = franjas.map(f => colaboradores.filter(c => colaboradorActivoEn(turnos[c.id], f)).length);
            const maxTotal = Math.max(...totales, 1);

            return (
              <div>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-3">
                  {configHor.areas.map(a => (
                    <div key={a.id} className="bg-gray-800 rounded-lg p-2 border border-gray-700" style={{ borderLeft: `3px solid ${a.color}` }}>
                      <div className="text-[10px] text-gray-500 uppercase">{a.nombre}</div>
                      <div className={`text-xs font-medium ${publicadoPorArea[a.id] ? 'text-green-400' : 'text-yellow-400'}`}>
                        {publicadoPorArea[a.id] ? '✓ Publicado' : '◷ Borrador'}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-auto">
                  <div style={{ minWidth: 140 + franjas.length * 24, display: 'inline-block' }}>
                    {/* Header de horas - solo redondas */}
                    <div className="flex bg-gray-900 border-b border-gray-700 sticky top-0 z-10">
                      <div style={{ width: 140, minWidth: 140 }} className="px-2 py-1.5 text-[11px] font-semibold text-gray-400 uppercase border-r border-gray-700">Rol</div>
                      {franjas.map(f => {
                        const redonda = f.endsWith(':00');
                        return (
                          <div key={f} style={{ width: 24, minWidth: 24, borderRight: redonda ? '1px solid #2A2A2A' : '1px solid rgba(42,42,42,0.13)' }} className="py-1.5 text-[11px] text-center">
                            {redonda ? <span className="text-gray-400 font-medium">{f.split(':')[0]}</span> : <span style={{ color: 'transparent' }}>·</span>}
                          </div>
                        );
                      })}
                    </div>

                    {/* Áreas */}
                    {configHor.areas.map(area => {
                      const colabs = porArea[area.id] || [];
                      if (colabs.length === 0) return null;
                      const tieneSubcats = area.subcategorias && area.subcategorias.length > 0;

                      // Función auxiliar para renderizar una fila de colaborador
                      const renderFila = (c) => {
                        const t = turnos[c.id] || {};
                        return (
                          <div key={c.id} className="flex border-b" style={{ borderColor: 'rgba(42,42,42,0.5)' }}>
                            <div style={{ width: 140, minWidth: 140, color: c.esLider ? '#FF4D4D' : '#F0EDE8', fontWeight: c.esLider ? 600 : 400 }} className="px-2 py-1 text-[11px] truncate border-r border-gray-700">{c.rol}</div>
                            {franjas.map(f => {
                              const activo = colaboradorActivoEn(t, f);
                              const redonda = f.endsWith(':00');
                              return (
                                <div key={f} title={activo ? `${c.nombre}${c.subcategoria ? ' (' + c.subcategoria + ')' : ''}` : ''} style={{
                                  width: 24, minWidth: 24, height: 22,
                                  background: activo ? area.color : 'transparent',
                                  borderRight: redonda ? '1px solid #2A2A2A' : '1px solid rgba(42,42,42,0.2)',
                                  opacity: c.esLider && activo ? 0.7 : 1
                                }}></div>
                              );
                            })}
                          </div>
                        );
                      };

                      // Header de área
                      const headerArea = (
                        <div className="flex bg-gray-900/50 border-b border-gray-700">
                          <div style={{ width: 140, minWidth: 140, color: area.color }} className="px-2 py-1 text-[11px] font-semibold uppercase border-r border-gray-700">{area.nombre}</div>
                          <div className="flex-1"></div>
                        </div>
                      );

                      if (tieneSubcats) {
                        // Agrupar colaboradores por sub-categoría
                        const porSubcat = {};
                        area.subcategorias.forEach(s => { porSubcat[s] = []; });
                        const sinSubcat = [];
                        colabs.forEach(c => {
                          if (c.subcategoria && porSubcat[c.subcategoria]) porSubcat[c.subcategoria].push(c);
                          else sinSubcat.push(c);
                        });

                        return (
                          <div key={area.id}>
                            {headerArea}
                            {area.subcategorias.map(s => {
                              const lista = porSubcat[s];
                              if (lista.length === 0) return null;
                              return (
                                <div key={s}>
                                  <div className="flex bg-gray-900/30 border-b" style={{ borderColor: 'rgba(42,42,42,0.5)' }}>
                                    <div style={{ width: 140, minWidth: 140, color: area.color, opacity: 0.75 }} className="pl-5 pr-2 py-0.5 text-[10px] uppercase border-r border-gray-700">↳ {s}</div>
                                    <div className="flex-1"></div>
                                  </div>
                                  {lista.map(renderFila)}
                                </div>
                              );
                            })}
                            {sinSubcat.length > 0 && (
                              <div>
                                <div className="flex bg-yellow-900/20 border-b" style={{ borderColor: 'rgba(42,42,42,0.5)' }}>
                                  <div style={{ width: 140, minWidth: 140, color: '#F1C40F', opacity: 0.85 }} className="pl-5 pr-2 py-0.5 text-[10px] uppercase border-r border-gray-700">⚠️ Sin sub-cat.</div>
                                  <div className="flex-1"></div>
                                </div>
                                {sinSubcat.map(renderFila)}
                              </div>
                            )}
                          </div>
                        );
                      }

                      // Sin sub-categorías: render plano
                      return (
                        <div key={area.id}>
                          {headerArea}
                          {colabs.map(renderFila)}
                        </div>
                      );
                    })}

                    {/* Totales */}
                    <div className="flex bg-gray-900 sticky bottom-0" style={{ borderTop: '2px solid #FF4D4D' }}>
                      <div style={{ width: 140, minWidth: 140 }} className="px-2 py-1.5 text-[11px] font-bold text-red-400 uppercase border-r border-gray-700">Total franja</div>
                      {totales.map((tot, i) => {
                        const intensidad = tot / maxTotal;
                        const color = tot === 0 ? '#444' : intensidad > 0.75 ? '#5DCAA5' : intensidad > 0.4 ? '#F0EDE8' : '#F1C40F';
                        const redonda = franjas[i].endsWith(':00');
                        return (
                          <div key={i} style={{ width: 24, minWidth: 24, color, borderRight: redonda ? '1px solid #2A2A2A' : '1px solid rgba(42,42,42,0.2)' }} className="py-1 text-[11px] text-center font-bold">{tot}</div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="mt-3 p-3 bg-gray-800 rounded-lg border border-gray-700 flex flex-wrap gap-3 text-xs text-gray-400">
                  {configHor.areas.map(a => (
                    <div key={a.id} className="flex items-center gap-1.5">
                      <span className="w-3 h-3 rounded-sm inline-block" style={{ background: a.color }}></span>
                      <span>{a.nombre}</span>
                    </div>
                  ))}
                  <div className="ml-auto text-red-400 font-medium">Líderes en rojo</div>
                </div>

                {colaboradores.length === 0 && (
                  <div className="text-center py-8 text-gray-500">
                    <div className="text-3xl mb-2">📊</div>
                    <div>El tablero está vacío. Cargá colaboradores y asigná turnos para verlos acá.</div>
                  </div>
                )}
              </div>
            );
          };

          return (
            <div>
              {vista === 'login' && <VistaLogin />}
              {vista === 'lista' && <VistaLista />}
              {vista === 'crear' && <VistaCrear />}
              {vista === 'detalle' && <VistaDetalle />}
              {vista === 'dashboard' && <VistaDashboard />}
              {vista === 'horarios' && <VistaHorarios />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FerniApp />);
    </script>

    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Estilos para impresión */
        @media print {
            /* Ocultar elementos de navegación */
            .no-print {
                display: none !important;
            }

            /* Mostrar header especial para impresión */
            .print-only {
                display: block !important;
            }

            /* Optimizar página */
            body {
                background: white !important;
            }

            #dashboard-container {
                background: white !important;
                min-height: auto !important;
            }

            /* Evitar saltos de página dentro de elementos */
            .bg-white {
                page-break-inside: avoid;
                break-inside: avoid;
            }

            /* Ajustar márgenes y padding para impresión */
            .p-6 {
                padding: 1rem !important;
            }

            /* Asegurar que los colores se impriman */
            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Ajustar tamaños de fuente para papel */
            .text-3xl {
                font-size: 1.5rem !important;
            }

            .text-2xl {
                font-size: 1.25rem !important;
            }

            .text-xl {
                font-size: 1.1rem !important;
            }

            /* Agregar bordes sutiles para mejor legibilidad */
            .shadow {
                box-shadow: none !important;
                border: 1px solid #e5e7eb !important;
            }
        }
    </style>
</body>
</html>
